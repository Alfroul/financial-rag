# LLM 模型配置
llm:
  model: "mimo-v2-pro"           # 小米 MiMo 旗舰模型
  base_url: "https://token-plan-cn.xiaomimimo.com/v1"
  api_key_env: "MIMO_API_KEY"    # 从环境变量读取 API Key
  temperature: 0.7
  max_tokens: 2048
  top_p: 0.9

# MiMo API Key（从环境变量读取）
mimo:
  api_key_env: "MIMO_API_KEY"

embedding:
  model: "BAAI/bge-large-zh-v1.5"  # SiliconFlow 免费中文 Embedding
  batch_size: 20

# 文本分块配置
chunker:
  chunk_size: 512              # 分块大小（tokens）
  chunk_overlap: 100           # 块重叠（tokens）
  separator: "\n\n"            # 段落分隔符
  strategy: "paragraph"        # 分块策略："paragraph"（按段落）或 "title"（按标题/章节）
  title_chunk_size: 1024       # 按标题分块时单章节最大 token 数
  title_patterns:              # 按标题分块时的标题正则模式
    - "^#{1,3}\\s+.+"
    - "^[一二三四五六七八九十]+、.+"
    - "^第[一二三四五六七八九十百]+[章节篇].+"
    - "^\\d+[.、]\\s*.+"

# 检索配置
retriever:
  top_k: 5                     # 检索返回数量
  score_threshold: 0.5         # 相似度阈值

# ChromaDB 配置
vectorstore:
  persist_directory: "data/chroma_db"  # 持久化目录
  collection_name: "financial_docs"     # 集合名称

# RAG Pipeline 配置
rag:
  max_context_tokens: 4000   # 检索文档在上下文中的最大 token 数
  query_rewrite: false       # 是否启用 Query Rewriting（多轮对话指代消解）

# 应用配置
app:
  title: "Financial RAG - 金融知识库问答"
  page_title: "金融 RAG 问答系统"

# 混合检索配置
hybrid:
  enabled: true
  strategy: "hybrid"              # vector / bm25 / hybrid
  rrf_k: 60
  vector_weight: 0.6
  bm25_weight: 0.4
  bm25_fetch_k: 30
  vector_fetch_k: 30

# 重排序配置
reranker:
  enabled: false
  retrieve_n: 20
  top_n: 5
  min_score: 0.0

# 日志配置
logging:
  level: "INFO"              # 日志级别：DEBUG / INFO / WARNING / ERROR

# 查询缓存配置（阶段 2）
cache:
  enabled: false
  similarity_threshold: 0.95
  max_size: 100

# 知识缓存配置（阶段 1）
fact_cache:
  enabled: false
  collection_name: "fact_cache"
  similarity_threshold: 0.7
  max_facts: 10000

# 数据同步配置（阶段 4）
sync:
  data_directory: "data/raw"
  hash_file: "data/.fact_cache_hashes.json"
  judge_model: "mimo-v2-pro"
  judge_base_url: "https://token-plan-cn.xiaomimimo.com/v1"

# 自我修正配置
self_correction:
  enabled: false
  max_retries: 2
  rerank_threshold_good: 0.7
  rerank_threshold_weak: 0.3
  verifier_base_url: "https://token-plan-cn.xiaomimimo.com/v1"
  verifier_model: "mimo-v2.5-pro"

# 可观测性配置
langfuse:
  enabled: false
  public_key: ""      # 从环境变量 LANGFUSE_PUBLIC_KEY 读取
  secret_key: ""      # 从环境变量 LANGFUSE_SECRET_KEY 读取
  host: "https://cloud.langfuse.com"  # 或本地部署地址

# Agent 配置
agent:
  enabled: false
  max_steps: 6

# 知识图谱配置
graph:
  enabled: false
  backend: "networkx"           # "networkx" 或 "neo4j"
  persist_path: "data/graph_store.pkl"
  neo4j_uri: "bolt://localhost:7687"
  neo4j_user: "neo4j"
  neo4j_password_env: "NEO4J_PASSWORD"
  max_neighbors: 50
  max_depth: 2

# MCP Server 配置
mcp_server:
  host: "localhost"
  port: 8080
  transport: "stdio"   # stdio 或 sse
